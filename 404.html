<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found</title>

    <meta name="theme-color"
          content="#3b82f6">

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;

        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;
            align-items:center;

            flex-direction:column;

            font-family:
                Inter,
                Arial,
                sans-serif;

            background:#0f172a;

            color:#f8fafc;

            text-align:center;

            padding:24px;

        }

        h1{

            font-size:6rem;

            color:#3b82f6;

            margin-bottom:12px;

        }

        h2{

            font-size:2rem;

            margin-bottom:18px;

        }

        p{

            color:#cbd5e1;

            max-width:520px;

            margin-bottom:32px;

            line-height:1.7;

        }

        a{

            display:inline-block;

            padding:14px 28px;

            border-radius:999px;

            background:#3b82f6;

            color:#fff;

            text-decoration:none;

            font-weight:600;

            transition:.3s;

        }

        a:hover{

            background:#2563eb;

            transform:translateY(-3px);

        }

    </style>

</head>

<body>

    <h1>

        404

    </h1>

    <h2>

        Page Not Found

    </h2>

    <p>

        The page you are looking for doesn't exist
        or may have been moved.

    </p>

    <a href="/">

        Back to Home

    </a>

</body>

</html>
