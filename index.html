<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuru Kuru Lab~</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Quicksand:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#181431;
    --bg-deep-2:#100d24;
    --bg-card:#241f47;
    --bg-card-2:#2c2655;
    --accent-lilac:#b89aff;
    --accent-lilac-soft:#8d72e0;
    --accent-peach:#ffd19a;
    --text-light:#f1ecff;
    --text-dim:#a89bd6;
    --line:#3a3268;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 15%, rgba(184,154,255,0.10), transparent 40%),
      radial-gradient(circle at 80% 75%, rgba(255,209,154,0.07), transparent 45%),
      linear-gradient(180deg, var(--bg-deep), var(--bg-deep-2));
    color:var(--text-light);
    font-family:'Quicksand', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
    position:relative;
  }

  /* ambient stars */
  .stars{
    position:fixed; inset:0; pointer-events:none; z-index:0;
  }
  .stars span{
    position:absolute;
    width:3px; height:3px;
    background:var(--text-light);
    border-radius:50%;
    opacity:0.25;
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.1;}
    50%{opacity:0.6;}
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:480px;
    background:linear-gradient(165deg, var(--bg-card), var(--bg-card-2));
    border:1px solid var(--line);
    border-radius:28px;
    padding:36px 28px 30px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    text-align:center;
  }

  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--accent-peach);
    margin-bottom:10px;
    opacity:0.85;
  }

  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:30px;
    margin:0 0 6px;
    line-height:1.15;
  }
  h1 span{ color:var(--accent-lilac); }

  .tagline{
    color:var(--text-dim);
    font-size:14px;
    margin:0 0 26px;
    line-height:1.5;
  }
  .tagline s{ color:#6e6398; }

  /* mascot */
  .stage{
    position:relative;
    width:180px;
    height:180px;
    margin:0 auto 18px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #mascot{
    width:150px;
    height:150px;
    cursor:pointer;
    user-select:none;
    filter:drop-shadow(0 12px 18px rgba(184,154,255,0.25));
    transition:transform 0.15s ease;
    touch-action:manipulation;
    object-fit:contain;
  }
  #mascot:active{ transform:scale(0.94); }

  @keyframes kuruSpin{
    0%{ transform:scale(1) rotate(0deg); }
    35%{ transform:scale(0.86) rotate(160deg); }
    70%{ transform:scale(1.06) rotate(330deg); }
    100%{ transform:scale(1) rotate(360deg); }
  }
  .spinning{ animation:kuruSpin 0.55s cubic-bezier(.36,.07,.19,.97); }

  .sparkle{
    position:absolute;
    pointer-events:none;
    border-radius:50%;
    background:var(--accent-peach);
    opacity:0.95;
    animation:fly 0.7s ease-out forwards;
  }
  @keyframes fly{
    to{ transform:translate(var(--dx), var(--dy)) scale(0); opacity:0; }
  }

  .readout{
    font-family:'Space Mono', monospace;
    background:rgba(0,0,0,0.25);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    margin:4px 0 22px;
  }
  .readout .label{
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .readout .count{
    font-size:40px;
    font-weight:700;
    color:var(--accent-lilac);
    line-height:1;
  }
  .readout .unit{
    font-size:12px;
    color:var(--text-dim);
    margin-top:4px;
  }

  .squish-btn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:15px 0;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:16px;
    color:#1c1638;
    background:linear-gradient(135deg, var(--accent-lilac), var(--accent-lilac-soft));
    cursor:pointer;
    box-shadow:0 10px 24px -8px rgba(184,154,255,0.45);
    transition:transform 0.12s ease, box-shadow 0.12s ease;
  }
  .squish-btn:hover{ transform:translateY(-2px); }
  .squish-btn:active{ transform:translateY(0) scale(0.98); }

  .log{
    min-height:18px;
    margin-top:14px;
    font-size:12.5px;
    color:var(--accent-peach);
    font-family:'Space Mono', monospace;
    opacity:0;
    transition:opacity 0.25s ease;
  }
  .log.show{ opacity:1; }

  .footer-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin-top:24px;
    font-size:12.5px;
    color:var(--text-dim);
  }
  .footer-row button{
    background:none;
    border:none;
    color:var(--text-dim);
    font-family:'Quicksand', sans-serif;
    font-size:12.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    padding:4px 0;
  }
  .footer-row button:hover{ color:var(--text-light); }
  .footer-row button:focus-visible{ outline:2px solid var(--accent-lilac); outline-offset:3px; border-radius:4px; }

  .note{
    margin-top:18px;
    font-size:11px;
    color:#5b5189;
    line-height:1.5;
  }

  /* leaderboard */
  .leaderboard-panel{
    margin-top:18px;
    background:rgba(0,0,0,0.22);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 14px 6px;
    text-align:left;
  }
  .lb-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:14px;
    margin-bottom:10px;
  }
  .lb-head button{
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:14px;
  }
  .lb-head button:hover{ color:var(--text-light); }

  .lb-name-row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .lb-name-row input{
    flex:1;
    min-width:0;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 12px;
    color:var(--text-light);
    font-family:'Quicksand', sans-serif;
    font-size:13px;
  }
  .lb-name-row input:focus{ outline:1px solid var(--accent-lilac); }
  .lb-name-row button{
    border:none;
    border-radius:10px;
    padding:9px 16px;
    background:var(--accent-lilac);
    color:#1c1638;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .lb-name-row button:hover{ background:var(--accent-lilac-soft); }

  .lb-list{
    list-style:none;
    margin:0;
    padding:0;
    max-height:220px;
    overflow-y:auto;
  }
  .lb-list li{
    display:flex;
    align-items:center;
    gap:10px;
    padding:7px 4px;
    border-bottom:1px solid var(--line);
    font-family:'Space Mono', monospace;
    font-size:12.5px;
  }
  .lb-list li:last-child{ border-bottom:none; }
  .lb-rank{ width:30px; color:var(--text-dim); flex:0 0 30px; }
  .lb-list li:nth-child(1) .lb-rank{ color:#ffd700; }
  .lb-list li:nth-child(2) .lb-rank{ color:#cfd4da; }
  .lb-list li:nth-child(3) .lb-rank{ color:#e3a36b; }
  .lb-name{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text-light); }
  .lb-score{ color:var(--accent-lilac); font-weight:700; }
  .lb-empty{ color:var(--text-dim); justify-content:center; font-family:'Quicksand', sans-serif; }

  @media (prefers-reduced-motion: reduce){
    .spinning{ animation:none; }
    .sparkle{ animation:none; display:none; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <div class="eyebrow">Doto Space Station &middot; Containment Log</div>
  <h1>Welcome to <span>Awawawawa</span> Lab</h1>
  <p class="tagline">A tribute page for Meisho Doto, the cutest uma in the Planet. Press the orb. See what happens.</p>

  <div class="stage">
    <img id="mascot" src="hertablob.png" alt="Doto" tabindex="0">
  </div>

  <div class="readout">
    <div class="label">Squish counter</div>
    <div class="count" id="count">0</div>
    <div class="unit" id="unit">times</div>
  </div>

  <button class="squish-btn" id="squishBtn">Squish the Awawawawa!</button>
  <div class="log" id="log">&nbsp;</div>

  <div class="footer-row">
    <button id="muteBtn">🔈 Sound: on</button>
    <button id="resetBtn">↺ Reset count</button>
    <button id="lbBtn">🏆 Leaderboard</button>
  </div>

  <div class="leaderboard-panel" id="lbPanel" hidden>
    <div class="lb-head">
      <span>🏆 Global Leaderboard</span>
      <button id="lbClose" aria-label="Tutup">✕</button>
    </div>
    <div class="lb-name-row">
      <input type="text" id="lbNameInput" maxlength="16" placeholder="Nama kamu (maks 16 huruf)">
      <button id="lbSubmitBtn">Submit</button>
    </div>
    <ol class="lb-list" id="lbList">
      <li class="lb-empty">Memuat...</li>
    </ol>
  </div>

  <p class="note">Made by @Adamv10_ On Instagram. Squish the Doto and enjoy!!</p>
</div>

<script>
  // ===================================================================
  // Leaderboard pakai backend PHP+MySQL di hosting kamu sendiri.
  // Pastikan leaderboard.php diupload ke folder yang sama dengan file ini.
  // Kalau lokasinya beda folder, ganti path di bawah ini.
  // ===================================================================
  const LB_API_URL = 'leaderboard.php';

  // ambient stars
  const starsWrap = document.getElementById('stars');
  for(let i=0;i<40;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3.5)+'s';
    starsWrap.appendChild(s);
  }

  const mascot = document.getElementById('mascot');
  const countEl = document.getElementById('count');
  const unitEl = document.getElementById('unit');
  const logEl = document.getElementById('log');
  const btn = document.getElementById('squishBtn');
  const muteBtn = document.getElementById('muteBtn');
  const resetBtn = document.getElementById('resetBtn');
  const stage = document.querySelector('.stage');

  // leaderboard elements
  const lbBtn = document.getElementById('lbBtn');
  const lbPanel = document.getElementById('lbPanel');
  const lbClose = document.getElementById('lbClose');
  const lbNameInput = document.getElementById('lbNameInput');
  const lbSubmitBtn = document.getElementById('lbSubmitBtn');
  const lbList = document.getElementById('lbList');

  let deviceId = localStorage.getItem('kuruDeviceId');
  if(!deviceId){
    deviceId = 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem('kuruDeviceId', deviceId);
  }
  lbNameInput.value = localStorage.getItem('kuruPlayerName') || '';

  let count = parseInt(localStorage.getItem('kuruCount') || '0', 10);
  let muted = localStorage.getItem('kuruMuted') === 'true';

  function render(){
    countEl.textContent = count;
    unitEl.textContent = count === 1 ? 'time' : 'times';
    muteBtn.textContent = muted ? '🔇 Sound: off' : '🔈 Sound: on';
  }

  const milestoneLog = (n) => {
    if(n === 1) return 'LOG: First squish recorded. Subject seems fine.';
    if(n === 10) return 'LOG: 10 squishes. Stability: nominal.';
    if(n === 25) return 'LOG: 25 squishes. Subject is getting dizzy.';
    if(n === 50) return 'LOG: 50 squishes. Stability: questionable.';
    if(n === 100) return 'LOG: 100 squishes. Send help.';
    if(n % 100 === 0) return 'LOG: '+n+' squishes. New record.';
    return null;
  };

  function showLog(text){
    if(!text) return;
    logEl.textContent = text;
    logEl.classList.add('show');
    clearTimeout(showLog._t);
    showLog._t = setTimeout(()=> logEl.classList.remove('show'), 2200);
  }

  const kuruAudio = new Audio('Loudkuru.mp3');

  function speakKuru(){
    if(muted) return;
    kuruAudio.currentTime = 0;
    kuruAudio.play().catch(()=>{});
  }

  function spawnSparkles(){
    const n = 8;
    for(let i=0;i<n;i++){
      const sp = document.createElement('span');
      sp.className = 'sparkle';
      const angle = (Math.PI*2*i)/n + Math.random()*0.3;
      const dist = 60 + Math.random()*30;
      sp.style.setProperty('--dx', Math.cos(angle)*dist+'px');
      sp.style.setProperty('--dy', Math.sin(angle)*dist+'px');
      sp.style.width = sp.style.height = (4+Math.random()*4)+'px';
      sp.style.left = '50%';
      sp.style.top = '50%';
      stage.appendChild(sp);
      sp.addEventListener('animationend', ()=> sp.remove());
    }
  }

  function squish(){
    count++;
    localStorage.setItem('kuruCount', String(count));
    render();
    mascot.classList.remove('spinning');
    requestAnimationFrame(()=> mascot.classList.add('spinning'));
    spawnSparkles();
    speakKuru();
    showLog(milestoneLog(count));
    scheduleSync();
  }

  mascot.addEventListener('animationend', ()=> mascot.classList.remove('spinning'));
  btn.addEventListener('click', squish);
  mascot.addEventListener('click', squish);
  mascot.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); squish(); }
  });

  muteBtn.addEventListener('click', ()=>{
    muted = !muted;
    localStorage.setItem('kuruMuted', String(muted));
    render();
  });

  resetBtn.addEventListener('click', ()=>{
    count = 0;
    localStorage.setItem('kuruCount', '0');
    render();
  });

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderLeaderboard(entries){
    entries = entries || [];
    entries.sort((a,b)=> (b.count||0) - (a.count||0));
    lbList.innerHTML = '';
    if(entries.length === 0){
      lbList.innerHTML = '<li class="lb-empty">Belum ada data. Jadilah yang pertama!</li>';
      return;
    }
    entries.forEach((e, i)=>{
      const li = document.createElement('li');
      li.innerHTML = '<span class="lb-rank">#'+(i+1)+'</span><span class="lb-name">'+escapeHtml(e.name || 'Anonim')+'</span><span class="lb-score">'+(e.count||0)+'</span>';
      lbList.appendChild(li);
    });
  }

  function fetchLeaderboard(){
    fetch(LB_API_URL, { headers: { 'Accept': 'application/json' } })
      .then(r => r.json())
      .then(data => renderLeaderboard(data.entries))
      .catch(()=>{ lbList.innerHTML = '<li class="lb-empty">Gagal memuat leaderboard.</li>'; });
  }

  function postScore(name, c){
    return fetch(LB_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: deviceId, name, count: c })
    });
  }

  function submitScore(){
    const name = (lbNameInput.value || 'Anonim').trim().slice(0, 16) || 'Anonim';
    localStorage.setItem('kuruPlayerName', name);
    postScore(name, count)
      .then(()=> fetchLeaderboard())
      .catch(()=> showLog('Gagal mengirim skor. Cek koneksi / leaderboard.php.'));
  }

  let syncTimer = null;
  function scheduleSync(){
    const savedName = localStorage.getItem('kuruPlayerName');
    if(!savedName) return; // belum pernah submit nama -> belum join leaderboard
    clearTimeout(syncTimer);
    syncTimer = setTimeout(()=>{
      postScore(savedName, count).catch(()=>{});
    }, 1500);
  }

  let lbPollTimer = null;
  lbBtn.addEventListener('click', ()=>{
    lbPanel.hidden = !lbPanel.hidden;
    if(!lbPanel.hidden){
      fetchLeaderboard();
      clearInterval(lbPollTimer);
      lbPollTimer = setInterval(fetchLeaderboard, 6000);
    }else{
      clearInterval(lbPollTimer);
    }
  });
  lbClose.addEventListener('click', ()=>{
    lbPanel.hidden = true;
    clearInterval(lbPollTimer);
  });
  lbSubmitBtn.addEventListener('click', submitScore);

  render();
</script>

</body>
</html>
